<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arnav Goyal - Resume</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        .download-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.2s, background-color 0.2s;
        }
        .download-btn:hover { 
            background-color: #0056b3; 
            transform: scale(1.05);
        }

        #resume-viewer {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <a href="./Arnav_Goyal_IIT_BHU.pdf" 
       download="Arnav_Goyal_Resume.pdf" 
       class="download-btn">
       Download PDF
    </a>

    <object id="resume-viewer" data="./Arnav_Goyal_IIT_BHU.pdf" type="application/pdf">
        <div style="padding: 20px; text-align: center;">
            <p>Your browser doesn't support direct PDF viewing.</p>
            <a href="./Arnav_Goyal_IIT_BHU.pdf" style="color: #007bff;">Click here to open the PDF directly.</a>
        </div>
    </object>

</body>
</html>
